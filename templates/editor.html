<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>制度编写系统</title>
    <link href="/static/vendor/bootstrap.min.css" rel="stylesheet">
    <script src="/tinymce/tinymce.min.js"></script>
    <link rel="stylesheet" href="/static/css/style.css?v=13">
</head>
<body>
    <!-- Document Sidebar -->
    <aside class="doc-sidebar" id="docSidebar">
        <div class="sidebar-header">
            <span class="sidebar-title">文档列表</span>
            <button class="sidebar-new-btn" onclick="createNewDoc()" title="新建文档">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 2v12M2 8h12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
            </button>
        </div>
        <div class="sidebar-warning">⚠ 草稿保存在浏览器本地，清除浏览器数据会导致丢失，请注意备份</div>
        <div class="sidebar-list" id="sidebarDocList"></div>
    </aside>
    <div class="sidebar-backdrop" id="sidebarBackdrop" onclick="toggleSidebar()"></div>

    <nav class="navbar" id="mainNavbar">
        <div class="container-fluid px-4">
            <div class="navbar-brand mb-0 d-flex align-items-center">
                <button class="sidebar-toggle-btn" id="sidebarToggle" onclick="toggleSidebar()" title="文档列表">
                    <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M2 4.5h14M2 9h14M2 13.5h14" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
                </button>
                <span class="navbar-label">制度编写系统</span>
                <span class="navbar-sep">/</span>
                <input type="text" id="docName" class="doc-name-input" placeholder="请输入制度名称" />
            </div>
            <div class="d-flex align-items-center gap-2">
                <button class="btn btn-outline-light" id="exportBtn" onclick="exportDocx()">
                    导出 DOCX
                </button>
            </div>
        </div>
    </nav>
    <div id="navbarSpacer"></div>

    <div id="stickyToolbar" class="sticky-toolbar">
        <div class="sticky-toolbar-top">
            <span class="sticky-toolbar-label" id="toolbarSecLabel"></span>
            <div class="sticky-toolbar-center">
                <input type="text" id="docNameToolbar" class="doc-name-input doc-name-toolbar" placeholder="请输入制度名称" />
            </div>
            <button class="btn btn-outline-light btn-sm" onclick="exportDocx()">导出 DOCX</button>
        </div>
        <div id="tinymce-toolbar-container"></div>
    </div>

    <div class="container my-4" id="editorContainer">
    </div>

    <script src="/static/js/marked.min.js"></script>
    <script src="/static/js/main.js?v=14"></script>
    <script src="/static/vendor/bootstrap.bundle.min.js"></script>
</body>
</html>
